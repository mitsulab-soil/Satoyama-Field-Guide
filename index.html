const ENVS = [
  {id:"z",name:"雑木林",icon:"🌳",color:"#4caf50",
    summary:"コナラ・クヌギを中心とした落葉広葉樹の森。里山の骨格をなす。",
    detail:"雑木林は里山の面積の多くを占め、かつては薪炭林として15〜20年周期で伐採と萌芽更新が繰り返されてきた。この「計画的な撹乱」こそが雑木林の多様性の源泉だ。伐採直後は地面に光が差し込み、カタクリやスミレといった林床の春植物が一斉に花を咲かせる。やがてアカメガシワやヌルデなどの先駆樹種が育ち、10年ほどでコナラやクヌギの若木が林冠を閉じ始める。この遷移の各段階が、異なる生物群集を支えている。つまり、雑木林はひとつの森ではなく、異なる年齢の森がモザイク状に並ぶパッチワークであり、このモザイク構造が里山の生物多様性を最大化していた。燃料革命により薪炭需要が消え、多くの雑木林が放置されて高齢化・暗化が進んでいる。林床に光が届かなくなると、カタクリもオオムラサキも姿を消す。雑木林の「手入れ」は単なる伝統の維持ではなく、生態系サービスの回復に直結する行為だ。",
    soil:"褐色森林土が主体で、落葉の分解により形成された腐植層（A層）が10〜30cmの厚さに発達している。この腐植層には団粒構造が見られ、水はけと保水力の両方に優れる。落ち葉の下を掘ると、白い菌糸が網目のように走っているのが見える。これは菌根菌のネットワークで、「Wood Wide Web」とも呼ばれる地下の情報・栄養交換システムだ。菌根菌は樹木の根と共生し、リン酸や微量元素の吸収を10〜100倍に高める。一方、樹木は光合成で得た糖の20〜30%を菌根菌に分配している。この共生関係がなければ、痩せた山の土壌で大木は育たない。",
    observe:["樹齢の異なる木が混在しているか（モザイク構造の確認）","林床に光が届いているか（光環境の評価）","落ち葉を3層に分けて分解段階を観察","萌芽更新の切り株を探す（根元から複数の幹が生えている）","キノコ（分解者）の種類・位置・基質の関係"],
    creatures:["コナラ","クヌギ","カブトムシ","オオムラサキ","キツツキ類"],
    sn:{spring:"新緑と林床の春植物（カタクリ・スミレ）が見頃。萌芽更新の切り株から新芽が伸びる。",summer:"樹液に集まるカブトムシ・クワガタの観察好機。林冠が閉じて木陰の涼が心地よい。",autumn:"紅葉のグラデーション、ドングリの種類比較、キノコの最盛期。落ち葉の匂いから放線菌を感じる。",winter:"落葉後の明るい林内で野鳥観察。冬芽の形で樹種を同定する。"}},
  {id:"y",name:"谷戸・湿地",icon:"💧",color:"#0288d1",
    summary:"丘陵地の谷間に形成される湿潤な低地。水源と生物多様性のホットスポット。",
    detail:"谷戸（やと）は関東の丘陵地に特有の地形で、浸食によってできた浅い谷に湧水が集まり、湿地帯を形成する。地域によって谷津（やつ）、谷地（やち）とも呼ばれ、日本の原風景の一つだ。谷戸の湧水は地下水脈から供給されるため、年間を通じて水温が安定しており（約15℃前後）、夏は冷たく冬は温かい。この安定した水環境が、多くの水辺の生き物にとって避難所（レフュージア）の役割を果たす。生態学的に最も重要なのは、水辺と陸地の境界にあたるエコトーン（移行帯）だ。このわずか数メートルの幅に、水生生物・湿生植物・陸上生物が重なり合って棲み、種の多様性が突出して高くなる。谷戸はかつてほぼすべてが水田として利用されていたが、耕作放棄によりヨシ原やハンノキ林への遷移が進んでいる。一方で、適度な管理のもとで維持された谷戸田は、水田と湿地のハイブリッドとして極めて高い生物多様性を保持する。",
    soil:"グライ土と呼ばれる還元状態の灰青色土壌が特徴的。常に水で飽和された状態にあるため、嫌気性微生物が卓越し、鉄イオン（Fe³⁺）が還元されて二価鉄（Fe²⁺）となり、土壌全体が独特の青灰色を呈する。有機物の嫌気的分解は好気的分解より遅いため、未分解の有機物が泥炭として蓄積することもある。特筆すべきは、酸化還元電位（Eh）の勾配が、わずか数十センチの距離で全く異なる微生物群集をつくり出すことだ。表層近くの酸化的な環境と、深層の還元的な環境が隣り合い、その境界で鉄やマンガンの酸化還元反応が活発に起きている。この微小スケールの環境多様性が、谷戸の土壌を「見えない生態系」として極めて豊かなものにしている。",
    observe:["湧水の位置を特定し水温を測定する（年間を通じて約15℃で安定）","グライ土を掘り出して色と質感、匂いを確認（硫化水素の微かな匂い）","水際のエコトーン幅を測定し、帯状の植生分布を記録","水生昆虫の種類から水質を推定する（カワゲラ→清水、ユスリカ→富栄養）","ヨシ・ガマ・セリなどの群落分布を地図に記録"],
    creatures:["アマガエル","ホタル","メダカ","トンボ類","サワガニ"],
    sn:{spring:"カエルの産卵ラッシュ。卵塊の形状で種類を同定できる。セリやクレソンの新芽が水際に。",summer:"ゲンジボタルの乱舞は水環境の健全性の証。トンボの羽化シーンに出会えることも。",autumn:"渡り鳥の中継地として重要。ヨシの穂が銀色に輝き、種子が風に乗る。",winter:"冬鳥（タシギ、クイナなど）の採餌場。氷の結晶が芸術的な模様をつくる。"}},
  {id:"t",name:"棚田・水田",icon:"🌾",color:"#f9a825",
    summary:"傾斜地に階段状に造成された水田。水循環と食料生産と生態系が重なる場。",
    detail:"棚田は、傾斜地に等高線に沿って階段状に造成された水田であり、土木技術と農業知識と水管理の知恵が凝縮された構造物だ。一枚の田が同時に「貯水池」（洪水調節）、「浄水装置」（水質浄化）、「生息地」（生物多様性）の三つの機能を担っている。日本の水田面積は約240万ヘクタールだが、そのすべてが雨水を一時的に貯留するダムとして機能しており、その貯水量は全国のダムの総貯水量に匹敵するとも言われる。水田の水は地下に浸透して地下水を涵養し、周辺の湧水や小川の水量を安定させる。近年、耕作放棄による棚田の減少が各地で深刻化しているが、その損失は米の生産量だけでなく、洪水調節機能、地下水涵養、生物多様性保全、景観維持など多面的な生態系サービスの喪失を意味する。棚田の保全は、農業政策であると同時に、防災・水資源・生物多様性のすべてに関わる国土管理の問題だ。",
    soil:"水田土壌は地球上で最も独特な酸化還元環境の一つをもつ。湛水期には土壌中の酸素が消費されて還元状態（嫌気的）になり、鉄が溶出して灰色に変色する。落水後は空気が入り込んで酸化状態に戻り、マンガンが酸化沈着して褐色の斑点をつくる。この年に一度の大規模な酸化還元サイクルが、他の土壌には見られない独自の微生物群集を育んでいる。水田土壌は上から「作土層」（耕される層、15〜20cm）、「鋤床層」（耕盤、硬く締まって水を通しにくい）、「心土層」（その下の自然土壌）の三層構造をなし、この構造が水管理の基盤となっている。鋤床層がなければ田に水を張ることができず、逆に鋤床層が厚すぎると根の伸長と地下水涵養が妨げられる。",
    observe:["畦の高さ・形状・材質から水管理技術の工夫を読み取る","水口（取水口）と水尻（排水口）の構造を観察し、水の流れを追う","季節による水田内の生き物相の劇的な変化を記録する","田面水の温度を数カ所で測定し、温度勾配を確認する","代掻き後の土壌粒子の沈降速度を観察する（団粒構造の指標）"],
    creatures:["イナゴ","ドジョウ","タニシ","赤トンボ","サギ類"],
    sn:{spring:"代掻き・田植えの時期。水が入ると一斉にカエルの大合唱が始まる。水面に映る空と山。",summer:"稲の成長と同期して水生昆虫が最盛期を迎える。田面の上をトンボが群飛する。",autumn:"稲刈りとはざ掛けの風景。落水後の田に渡り鳥のシギ・チドリ類が飛来する。",winter:"冬水田んぼ（冬期湛水）を実施している田があれば、水鳥の楽園に。レンゲの種まきも。"}},
  {id:"o",name:"小川・水路",icon:"🏞️",color:"#00897b",
    summary:"里山を流れる細流と人工水路。水の道が里山の生態系をひとつにつなぐ。",
    detail:"里山の小川は、雑木林からの湧水を集め、谷戸を通過し、水田に水を引き入れ、集落を経て再び大きな川に戻る。この水の旅路が、里山の各環境を生態学的にひとつにつなぐ「回廊」の役割を果たしている。自然の流路と人工の水路（用水路・排水路）が一体となった水系は、里山の「循環系」であり「血管」のような存在だ。護岸されていない土水路では、水際にミゾソバやセリが繁茂し、水中にはカワニナやサワガニが棲み、それらを餌にカワセミやサギ類がやってくる。水路の構造（蛇行の有無、瀬と淵の連続、底質の粒度分布）は、そこに棲める生き物を決定づける最も重要な環境因子だ。近年、コンクリート三面張りの水路が魚類や両生類の移動を遮断し、里山の生態系を分断する問題が各地で認識されるようになった。一部の地域では、生き物の移動路を確保するための「魚道」の設置や、土水路への回帰が試みられている。",
    soil:"小川沿いには砂質土壌や沖積土が堆積し、洪水のたびに地形と土壌が更新される。この「攪乱による更新」が河畔林の若返りと種の多様性維持に寄与している。水路の底質は、砂・礫・泥の比率によって分類でき、これが水生生物の生息を直接左右する。たとえば、礫底にはカワゲラやヘビトンボの幼虫が、砂泥底にはヤゴやユスリカが、泥底にはドジョウやタニシが棲み分ける。底質のモザイクが生物の多様性を支えているのだ。",
    observe:["流速の変化と底質（砂・礫・泥の比率）の対応関係を記録","瀬（浅くて流れが速い）と淵（深くて流れが緩い）の交互パターンを確認","水際植物の帯状分布を横断面でスケッチする","水温を上流と下流で測定し、湧水の流入や日照の影響を確認","人工水路（コンクリート）と自然流路（土水路）の生き物の違いを比較"],
    creatures:["カワセミ","サワガニ","イモリ","カワニナ","クレソン"],
    sn:{spring:"雪解け水による増水。両生類（カエル・イモリ）が水路を移動して繁殖地へ向かう。",summer:"水遊びの季節。水生昆虫（カワゲラ・トビケラ・ヤゴ）の観察適期。",autumn:"水量減少で底質が露出。落葉が溜まる場所に水生昆虫が集中する。",winter:"霜柱と氷の造形美。水鳥（カルガモ・コガモ）が飛来する。"}},
  {id:"k",name:"草地・原っぱ",icon:"🌻",color:"#7cb342",
    summary:"定期的な草刈りで維持される半自然草原。草花と昆虫の楽園であり、草堆肥の供給源。",
    detail:"里山の草地は、放っておけば数年で藪になり、やがて森林へと遷移してしまう。人が定期的に草を刈ることで初めて維持される「半自然草原」であり、その意味で里山の中でも最も「人の手」を必要とする環境だ。しかしこの環境には、森林にも農地にもない固有の生態系が存在する。日本の秋の七草（ハギ、ススキ、クズ、ナデシコ、オミナエシ、フジバカマ、キキョウ）はすべて草原の植物であり、かつての日本人の暮らしがいかに草地と密接だったかを物語っている。草地は昆虫にとっても重要で、バッタ・キリギリス・チョウ類の多くが草原性の種だ。草丈の違いが微小な環境勾配をつくり、10cmの草地と30cmの草地では棲む虫がまったく異なる。さらに、刈り取った草は堆肥の原料（草堆肥）として農業に還元されてきた。ススキやチガヤなどのイネ科草本は、C/N比が高く分解が遅いため、長期間かけてゆっくりと土壌に炭素を供給する。この草堆肥のサイクルが、里山における「一次発酵→二次発酵」の橋渡しを担っている。",
    soil:"草地の土壌は、草の根が密に張り巡らされた「根圏」が発達し、驚くほど高い炭素貯留能力をもつ。草の根は毎年一部が枯死し、それが微生物に分解されることで、深い腐植層が形成される。永年草地の土壌炭素量は、同面積の森林に匹敵することもある。また、イネ科草本の根は土壌中に細かい隙間をつくり、団粒構造の発達を促進する。草堆肥の原料となる刈り草は、この土壌から養分を吸い上げて育ったものであり、堆肥化して農地に戻すことは、「草地→農地→草地」の養分循環そのものだ。",
    observe:["草丈の違い（5cm/15cm/30cm/50cm）で昆虫相がどう変わるか比較","春→夏→秋の草花の開花リレーを記録する（何月にどの花が咲くか）","草刈り後の再生スピードを測定する（1週間でどこまで伸びるか）","バッタ・チョウの種類と個体数密度を計測","草を1株抜いて根の深さと広がりを観察する"],
    creatures:["バッタ類","チョウ類","ススキ","ワレモコウ","ノウサギ"],
    sn:{spring:"スミレ・タンポポ・レンゲの花畑。越冬から目覚めたチョウが舞い始める。",summer:"虫の大合唱が始まる。草刈りの時期であり、刈り草は堆肥の原料になる。",autumn:"ススキの穂が銀色に輝き、秋の七草が揃う。バッタ・キリギリスの鳴き声。",winter:"枯れ野の静寂。ノスリやチョウゲンボウなど猛禽類の狩り場になる。"}},
  {id:"r",name:"林縁・生け垣",icon:"🌿",color:"#689f38",
    summary:"森と開けた場所の境界。「エッジ効果」により生物が集中する生態系の要所。",
    detail:"林縁は森林と草地・農地の接点であり、生態学でいう「エッジ効果」が最もよく現れる場所だ。森林の鳥と草地の鳥が同時に観察でき、日向を好む植物と日陰を好む植物が数メートルの幅に共存する。この環境移行帯（エコトーン）には、両側の環境を利用する「ジェネラリスト」種が集中し、種の多様性が突出して高くなる。生け垣は、人が意図的につくった「人工の林縁」だ。ツバキ、サザンカ、茶の木、カシ類などが使われ、防風・境界・景観の機能を果たすとともに、生態系の「回廊（コリドー）」として森と森をつなぎ、種の移動を支えてきた。農村の屋敷林（屋敷を取り囲むケヤキやシイの大木）も広義の林縁であり、フクロウの営巣木やカブトムシの発生源として重要な役割を果たす。都市化や圃場整備で生け垣と屋敷林が失われることは、里山の生態系ネットワークの「断線」を意味する。",
    soil:"林縁の土壌は、森林側の腐植に富む褐色森林土と、開放地側の乾燥した土壌の移行帯に位置する。日照条件と水分条件の急激な勾配に沿って、わずか2〜3メートルの距離で土壌微生物群集が大きく入れ替わる。この微小スケールの環境変化が、地上の植生にも反映され、林縁には他の環境には見られないユニークな植物群落が成立する。つる植物（クズ、フジ、アケビなど）は林縁に最も多く、光を求めて樹冠を覆い、林縁のダイナミックな景観をつくる。",
    observe:["林縁から森林内部へ5m間隔で光量を測定し、光環境の勾配を記録","生け垣に使われている樹種を同定し、その選択理由を考察する","林縁に集まる鳥の種類と行動パターン（採餌・移動・さえずり）を観察","つる植物の分布と巻きつき方（左巻き・右巻き）のパターンを確認","エッジ効果を昆虫の種数で定量的に確認する（林内・林縁・草地で捕虫網調査）"],

    {name:"オオクワガタ",env:"雑木林",note:"日本最大のクワガタムシ。幼虫は立ち枯れや倒木の朽木の中で白色腐朽菌が分解した木部を食べて2〜3年かけて成長する。成虫は大径木の樹洞に潜み、夜間にのみ活動する。里山の大木と朽木が失われることで急速に減少し、野生個体は極めて希少になった。"},

  {id:2,name:"谷戸の湧水と湿地",season:"spring",diff:1,time:"45分",dist:"1.3km",envs:["谷戸・湿地","小川"],desc:"丘陵の谷間に湧き出す水を辿り、グライ土（青灰色の還元土壌）と水辺の生き物に出会うコース。湧水ポイントで水温を測定し、エコトーン（水辺と陸地の境界）に集まる生き物の多様さを体感する。春はカエルの産卵ラッシュの時期で、卵塊の形状から種類を見分ける練習ができる。",checks:["湧水ポイントを探して水温を確認","グライ土を掘って色と質感を観察","カエルの卵塊を見つけて種を同定","セリやクレソンの群落を記録"]},
  {id:3,name:"棚田の水と生き物",season:"summer",diff:1,time:"50分",dist:"1.8km",envs:["棚田・水田","草地"],desc:"青々と育つ稲の間を歩き、水田生態系の驚くべき多様性を体験する。水口（取水口）の構造を観察し、田面水の温度を測定し、イナゴ・トンボ・カエルたちの大合唱を聞く。畦に咲く草花も見逃せない。水田はただの農地ではなく、巨大な人工湿地であることを実感するコース。",checks:["水口の構造を観察しスケッチ","田面水の温度を数カ所で測定","イナゴ・トンボの種類を記録","畦の草花を5種類見つける"]},
  {id:4,name:"渓流と苔の回廊",season:"summer",diff:2,time:"60分",dist:"2.5km",envs:["小川","雑木林"],desc:"涼しい渓流沿いを歩き、苔むした岩の上に土壌生成の最初の段階を見る。瀬（浅く速い流れ）と淵（深く緩い流れ）の交互パターンを確認し、底質の違いで棲み分ける水生昆虫を観察する。サワガニを探し、水温の上下流差を測定する。夏でも涼しい、里山の「天然クーラー」コース。",checks:["瀬と淵を3セット以上確認","苔の種類を観察（スギゴケ・ハイゴケ等）","サワガニを見つける","水温を上流と下流で比較測定"]},
  {id:5,name:"紅葉と菌類の尾根",season:"autumn",diff:2,time:"55分",dist:"2.2km",envs:["雑木林","林縁"],desc:"色づくモミジ・ケヤキ・コナラのグラデーションを楽しみながら尾根を歩き、キノコたちが担う「分解者」の仕事を目撃する。菌根菌の子実体、倒木上のサルノコシカケ、落ち葉を分解する小さなキノコ — 足元には目に見える一次発酵の現場が広がっている。ドングリの種類比較やリスの食痕も楽しい。",checks:["紅葉のグラデーションを写真に記録","菌根菌の子実体（キノコ）を3種類以上見つける","ドングリの種類を比較（コナラ・クヌギ・シラカシ）","リスやネズミの食痕（齧り跡）を探す"]},
  {id:6,name:"草原と秋の七草",season:"autumn",diff:1,time:"35分",dist:"1.2km",envs:["草地","林縁"],desc:"ススキの原をかき分け、秋の七草と里山の草文化を味わうコース。ハギ・ススキ・クズ・ナデシコ・オミナエシ・フジバカマ・キキョウ — 全種見つけられるか挑戦してみよう。バッタの種類を数え、草の根を1本抜いて根の深さと広がりを観察する。草堆肥の材料であるススキを手で触り、その繊維の強さを実感する。",checks:["秋の七草を何種類見つけられるか","バッタの種類を3種以上確認","草を1株抜いて根の深さを測定","ススキの茎を触って繊維の硬さを確認"]},
  {id:7,name:"冬鳥と落葉の森",season:"winter",diff:1,time:"35分",dist:"1.0km",envs:["雑木林","谷戸・湿地"],desc:"葉を落とした明るい森で野鳥を観察する、冬ならではのコース。エナガ・シジュウカラ・コゲラなどの混群が林を移動する様子を追い、冬芽の形で樹種を同定する練習をする。霜柱を踏み、落ち葉堆肥の山に手を突っ込んで発酵熱（40〜60℃にもなる）を体感する。土壌が「寝かされる」冬の里山を歩く。",checks:["混群（エナガ・シジュウカラ等）を観察","冬芽の形を3種類以上スケッチ","霜柱の高さと構造を観察","落ち葉堆肥の温度を手で確認"]},
  {id:8,name:"里の暮らし探訪",season:"winter",diff:1,time:"40分",dist:"1.5km",envs:["棚田・水田","草地"],desc:"冬枯れの田畑と屋敷林を巡り、里山の文化的景観を読み解くコース。屋敷林の樹種（ケヤキ・シイ）から防風の知恵を読み取り、石垣や土壁の構造を観察する。冬水田んぼ（冬期湛水）を実施している田があれば水鳥の楽園に。生け垣の樹種を同定し、その「生態系の回廊」としての機能を考察する。",checks:["屋敷林の樹種を3種以上同定","石垣・土壁の素材と構造を観察","冬水田んぼの水鳥を記録","生け垣の樹種と機能を考察"]},
];

/* ═══════════ UI Components ═══════════ */

function Badge({children, color, bg}) {
  const c = color || "#5d4037";
  return <span style={{display:"inline-flex",alignItems:"center",gap:3,padding:"3px 10px",borderRadius:20,background:bg||c+"18",color:c,fontSize:11,fontWeight:600,fontFamily:FB}}>{children}</span>;
}
function Card({children, style, onClick}) {
  return <div onClick={onClick} style={{background:"rgba(255,255,255,0.92)",backdropFilter:"blur(8px)",borderRadius:18,padding:20,boxShadow:"0 2px 16px rgba(60,40,20,0.06)",cursor:onClick?"pointer":"default",transition:"all 0.2s",...(style||{})}}>{children}</div>;
}
function BackBtn({onClick, color}) {
  return <button onClick={onClick} style={{background:"none",border:"none",cursor:"pointer",color:color||"#5d4037",fontFamily:FB,fontSize:14,display:"flex",alignItems:"center",gap:4,marginBottom:14,padding:0}}>← もどる</button>;
}
function STitle({children, sub}) {
  return <div style={{marginBottom:16}}><h2 style={{fontFamily:FT,color:"#2e1a0e",fontSize:22,fontWeight:700,letterSpacing:1}}>{children}</h2>{sub&&<p style={{color:"#a1887f",fontSize:12,marginTop:4,fontFamily:FB}}>{sub}</p>}</div>;
}
function Acc({title, children, defaultOpen}) {
  const [open, setOpen] = useState(!!defaultOpen);
  return <div style={{marginBottom:8}}>
    <button onClick={() => setOpen(!open)} style={{width:"100%",padding:"12px 16px",borderRadius:open?"12px 12px 0 0":"12px",border:"1px solid #e8e0d8",borderBottom:open?"none":"1px solid #e8e0d8",background:open?"#faf6f1":"rgba(255,255,255,0.8)",cursor:"pointer",textAlign:"left",fontFamily:FB,fontSize:14,color:"#3e2723",display:"flex",alignItems:"center",gap:8}}>
      <span style={{flex:1,fontWeight:600}}>{title}</span>
      <span style={{fontSize:12,color:"#bcaaa4",transition:"transform 0.2s",transform:open?"rotate(180deg)":"none"}}>▼</span>
    </button>
    {open&&<div style={{padding:"14px 16px",borderRadius:"0 0 12px 12px",border:"1px solid #e8e0d8",borderTop:"none",background:"#faf6f1",animation:"fadeIn .25s ease",fontSize:13,color:"#5d4037",lineHeight:1.85}}>{children}</div>}
  </div>;
}
function PRing({value, max}) {
  const sz=44,cl="#5d4037",pct=max>0?value/max:0,r=19,c=2*Math.PI*r;
  return <svg width={sz} height={sz} style={{transform:"rotate(-90deg)"}}><circle cx={22} cy={22} r={r} fill="none" stroke="#e8e0d8" strokeWidth={3}/><circle cx={22} cy={22} r={r} fill="none" stroke={cl} strokeWidth={3} strokeDasharray={c} strokeDashoffset={c*(1-pct)} strokeLinecap="round" style={{transition:"stroke-dashoffset .5s ease"}}/><text x={22} y={22} textAnchor="middle" dominantBaseline="central" fill={cl} fontSize={10} fontWeight={700} style={{transform:"rotate(90deg)",transformOrigin:"center"}}>{value}</text></svg>;
}

/* ═══════════ ENV TAB ═══════════ */

      <Card style={{border:"2px solid "+env.color+"22"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><span style={{fontSize:36}}>{env.icon}</span><div><h2 style={{fontFamily:FT,fontSize:22,color:"#2e1a0e"}}>{env.name}</h2><p style={{fontSize:12,color:"#a1887f",fontFamily:FB}}>{env.summary}</p></div></div>
        <p style={{fontSize:14,color:"#4e342e",lineHeight:1.9,marginBottom:16,fontFamily:FB}}>{env.detail}</p>
        {sn&&<div style={{padding:"10px 14px",borderRadius:12,background:ss.accent+"10",marginBottom:14}}><div style={{fontSize:11,color:ss.accent,fontWeight:700,fontFamily:FB}}>{ss.emoji+" "+ss.label+"の見どころ"}</div><div style={{fontSize:13,color:"#4e342e",marginTop:4,fontFamily:FB,lineHeight:1.8}}>{sn}</div></div>}
        <Acc title="🪱 土壌のしくみ">{env.soil}</Acc>
        <Acc title="🔍 観察ポイント"><ul style={{margin:0,paddingLeft:18}}>{env.observe.map((o,i)=><li key={i} style={{marginBottom:6}}>{o}</li>)}</ul></Acc>
        <Acc title="🦋 代表的な生き物"><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{env.creatures.map(c=><Badge key={c} color={env.color}>{c}</Badge>)}</div></Acc>
      </Card>
    </div>;
  }
  return <div><STitle sub="里山を構成する6つの環境を分類・観察する">里山の環境</STitle>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>{ENVS.map((env,i)=><Card key={env.id} onClick={()=>setSel(i)} style={{animation:"slideUp .35s ease "+i*.06+"s both",borderLeft:"4px solid "+env.color}}><div style={{display:"flex",alignItems:"center",gap:14}}><span style={{fontSize:30,width:50,height:50,borderRadius:14,background:env.color+"12",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{env.icon}</span><div style={{flex:1}}><div style={{fontFamily:FT,fontSize:16,color:"#2e1a0e",fontWeight:700}}>{env.name}</div><div style={{fontSize:12,color:"#8d6e63",marginTop:3,lineHeight:1.6,fontFamily:FB}}>{env.summary}</div></div><span style={{color:"#d7ccc8",fontSize:16}}>→</span></div></Card>)}</div>

/* ═══════════ LIFE TAB ═══════════ */

function LifeTab() {
  const [ac, setAc] = useState(0);
  const [disc, setDisc] = useState([]);
  const [si, setSi] = useState(null);
  const total = ECO.reduce((a,c)=>a+c.items.length,0);
  const cat = ECO[ac];
  if (si) return <div style={{animation:"slideUp .3s ease"}}><BackBtn onClick={()=>setSi(null)}/><Card><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}><span style={{fontSize:32}}>{ECO[ac].icon}</span><div><h2 style={{fontFamily:FT,fontSize:22,color:"#2e1a0e"}}>{si.name}</h2><Badge>{si.env}</Badge></div></div><p style={{fontSize:14,color:"#4e342e",lineHeight:1.9,fontFamily:FB}}>{si.note}</p><button onClick={()=>setDisc(d=>d.includes(si.name)?d.filter(x=>x!==si.name):[...d,si.name])} style={{marginTop:16,padding:"10px 20px",borderRadius:12,border:"none",cursor:"pointer",background:disc.includes(si.name)?"#4caf50":"#5d4037",color:"white",fontFamily:FB,fontSize:14}}>{disc.includes(si.name)?"✓ 発見済み — 取り消す":"発見した！"}</button></Card></div>;
  return <div><STitle sub={total+"種の動植物・菌類・土壌生物を記録しよう"}>生態系図鑑</STitle>
    <Card style={{padding:14,marginBottom:16,display:"flex",alignItems:"center",gap:14}}><PRing value={disc.length} max={total}/><div><div style={{fontFamily:FB,fontWeight:700,color:"#3e2723",fontSize:14}}>{disc.length+" / "+total+" 種を発見"}</div><div style={{fontSize:11,color:"#a1887f",marginTop:2}}>{disc.length===0?"タップで記録しよう":disc.length>=total?"🎉 コンプリート！":"あと "+(total-disc.length)+" 種"}</div></div></Card>
    <div style={{display:"flex",gap:4,marginBottom:16,overflowX:"auto",paddingBottom:4}}>{ECO.map((c,i)=>{const cd=c.items.filter(it=>disc.includes(it.name)).length;return<button key={c.cat} onClick={()=>setAc(i)} style={{padding:"8px 10px",borderRadius:12,border:"none",cursor:"pointer",background:ac===i?"#3e2723":"rgba(255,255,255,0.8)",color:ac===i?"white":"#5d4037",fontSize:11,fontFamily:FB,flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",gap:2,boxShadow:"0 1px 4px rgba(0,0,0,.05)",minWidth:54}}><span style={{fontSize:18}}>{c.icon}</span><span>{c.cat}</span><span style={{fontSize:9,opacity:.7}}>{cd+"/"+c.items.length}</span></button>})}</div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{cat.items.map((item,i)=>{const found=disc.includes(item.name);return<Card key={item.name} onClick={()=>setSi(item)} style={{padding:14,textAlign:"center",animation:"slideUp .3s ease "+i*.04+"s both",boxShadow:found?"inset 0 0 0 2px #4caf50":"0 1px 8px rgba(0,0,0,.04)"}}>{found&&<div style={{fontSize:10,color:"#4caf50",fontWeight:700,marginBottom:2,fontFamily:FB}}>✓ 発見</div>}<div style={{fontFamily:FB,fontSize:14,color:"#3e2723",fontWeight:600}}>{item.name}</div><div style={{fontSize:10,color:"#a1887f",marginTop:3}}>{item.env}</div></Card>})}</div>
  </div>;
}

  if (si) return <div style={{animation:"slideUp .3s ease"}}><BackBtn onClick={()=>setSi(null)} color={cur.color}/><Card style={{border:"2px solid "+cur.color+"22"}}><div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}><span style={{fontSize:28,width:48,height:48,borderRadius:14,background:cur.color+"12",display:"flex",alignItems:"center",justifyContent:"center"}}>{cur.icon}</span><div><h2 style={{fontFamily:FT,fontSize:20,color:"#2e1a0e"}}>{si.name}</h2><Badge color={cur.color}>{si.season}</Badge></div></div><p style={{fontSize:14,color:"#4e342e",lineHeight:1.9,fontFamily:FB}}>{si.desc}</p></Card></div>;
  return <div><STitle sub="里山を支える農業・山仕事・文化の知恵">暮らし・農業・文化</STitle>
    <div style={{display:"flex",gap:6,marginBottom:18}}>{LIVING.map((s,i)=><button key={s.id} onClick={()=>{setSec(i);setSi(null)}} style={{flex:1,padding:"10px 6px",borderRadius:14,border:"none",cursor:"pointer",background:sec===i?s.color:"rgba(255,255,255,0.8)",color:sec===i?"white":"#5d4037",fontSize:12,fontFamily:FB,fontWeight:sec===i?700:400,boxShadow:"0 1px 6px rgba(0,0,0,.05)",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}><span style={{fontSize:20}}>{s.icon}</span>{s.title.replace("里山の","")}</button>)}</div>
    <div style={{display:"flex",flexDirection:"column",gap:8}}>{cur.items.map((item,i)=><Card key={item.name} onClick={()=>setSi(item)} style={{padding:16,animation:"slideUp .3s ease "+i*.05+"s both",borderLeft:"3px solid "+cur.color}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"start"}}><div style={{flex:1}}><div style={{fontFamily:FT,fontSize:15,color:"#2e1a0e",fontWeight:700}}>{item.name}</div><div style={{fontSize:12,color:"#8d6e63",marginTop:4,lineHeight:1.6,fontFamily:FB,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{item.desc}</div><div style={{marginTop:6}}><Badge color={cur.color} bg={cur.color+"10"}>{item.season}</Badge></div></div><span style={{color:"#d7ccc8",fontSize:16,marginLeft:8,flexShrink:0}}>→</span></div></Card>)}</div>
  </div>;
}

/* ═══════════ FERMENT TAB ═══════════ */

function FermentTab() {
  const [al, setAl] = useState(null);
  const [qa, setQa] = useState(null);
  if (al !== null) {
    const cy = FERM[al];
    return <div style={{animation:"slideUp .35s ease"}}><BackBtn onClick={()=>{setAl(null);setQa(null)}} color={cy.color}/>
      <Card style={{border:"2px solid "+cy.color+"22"}}>
        <div style={{fontSize:42,marginBottom:8}}>{cy.icon}</div><Badge color={cy.color}>{cy.layer}</Badge>
        <h2 style={{fontFamily:FT,fontSize:22,color:"#2e1a0e",marginTop:8}}>{cy.title}</h2>
        <p style={{fontFamily:FT,fontSize:13,color:cy.color,marginTop:4,marginBottom:16,fontStyle:"italic",lineHeight:1.7}}>{"「"+cy.principle+"」"}</p>
        <p style={{fontSize:14,color:"#4e342e",lineHeight:1.95,fontFamily:FB,marginBottom:20}}>{cy.content}</p>
        <Acc title="🔗 つながるキーワード" defaultOpen={true}><div style={{display:"flex",flexWrap:"wrap",gap:6}}>{cy.links.map(c=><Badge key={c} color={cy.color}>{c}</Badge>)}</div></Acc>
        <Acc title="🥾 フィールドワーク"><p style={{margin:0}}>{cy.field}</p></Acc>
        <div style={{marginTop:12,padding:"16px 18px",borderRadius:14,background:cy.bg}}>
          <div style={{fontSize:12,fontWeight:700,color:cy.color,marginBottom:8,fontFamily:FB}}>🧠 ミニクイズ</div>
          <p style={{fontFamily:FB,fontSize:14,color:"#2e1a0e",marginBottom:12,fontWeight:600}}>{cy.quiz.q}</p>
          {cy.quiz.opts.map((opt,i)=>{const correct=i===cy.quiz.a,picked=qa===i;let bg2="white",bd="1px solid #e0d6cf";if(qa!==null&&correct){bg2="#e8f5e9";bd="2px solid #4caf50"}else if(picked&&!correct){bg2="#ffebee";bd="2px solid #e53935"}return<button key={i} onClick={()=>setQa(i)} disabled={qa!==null} style={{display:"block",width:"100%",padding:"10px 14px",borderRadius:10,border:bd,background:bg2,cursor:qa!==null?"default":"pointer",textAlign:"left",fontSize:13,color:"#3e2723",fontFamily:FB,marginBottom:6}}>{qa!==null&&correct&&"✅ "}{picked&&!correct&&"❌ "}{opt}</button>})}
          {qa!==null&&<p style={{fontSize:13,marginTop:6,fontFamily:FB,animation:"fadeIn .3s",color:qa===cy.quiz.a?"#2e7d32":"#c62828"}}>{qa===cy.quiz.a?"正解！🎉":"正解は「"+cy.quiz.opts[cy.quiz.a]+"」です"}</p>}
        </div>
      </Card>
    </div>;
  }
  return <div><STitle sub="三層の発酵サイクルで里山の循環を読み解く">醸す谷 — Vallis Fermenti</STitle>
    <Card style={{marginBottom:20,textAlign:"center",padding:24}}><div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:0,flexWrap:"wrap"}}>{FERM.map((c,i)=><div key={c.id} style={{display:"flex",alignItems:"center"}}><div style={{padding:"10px 16px",borderRadius:14,background:c.bg,border:"2px solid "+c.color+"30",textAlign:"center"}}><div style={{fontSize:24}}>{c.icon}</div><div style={{fontFamily:FT,fontSize:12,color:c.color,fontWeight:700,marginTop:4}}>{c.layer}</div></div>{i<2&&<span style={{fontSize:18,color:"#d7ccc8",margin:"0 6px"}}>→</span>}</div>)}</div><div style={{fontSize:20,color:"#d7ccc8",marginTop:8}}>↻</div><p style={{fontFamily:FT,fontSize:11,color:"#a1887f",marginTop:4,fontStyle:"italic"}}>三つの発酵が巡る里山の循環</p></Card>
    {FERM.map((cy,i)=><Card key={cy.id} onClick={()=>setAl(i)} style={{marginBottom:10,borderLeft:"4px solid "+cy.color,animation:"slideUp .35s ease "+i*.08+"s both"}}><div style={{display:"flex",alignItems:"center",gap:14}}><span style={{fontSize:30,width:56,height:56,borderRadius:16,background:cy.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{cy.icon}</span><div style={{flex:1}}><Badge color={cy.color}>{cy.layer}</Badge><div style={{fontFamily:FT,fontSize:16,color:"#2e1a0e",fontWeight:700,marginTop:4}}>{cy.title}</div><div style={{fontSize:12,color:"#8d6e63",marginTop:2,fontFamily:FB,fontStyle:"italic"}}>{cy.principle}</div></div><span style={{color:"#d7ccc8"}}>→</span></div></Card>)}
  </div>;
}

/* ═══════════ BG ═══════════ */

function BgLayer({season}) {
  const s = SEASONS[season];
  const ps = [];
  for (let i=0;i<14;i++) ps.push(<span key={i} style={{position:"absolute",left:((i*7.1+3)%100)+"%",top:-30,fontSize:12+(i%4)*5,opacity:.12+(i%3)*.04,animation:"fall "+(7+i*1.4)+"s linear "+i*.8+"s infinite",pointerEvents:"none"}}>{s.particle}</span>);
  return <div style={{position:"fixed",inset:0,background:s.grad,zIndex:0,overflow:"hidden",pointerEvents:"none"}}>{ps}</div>;
}

/* ═══════════ MAIN ═══════════ */

function App() {
  const [tab, setTab] = useState("home");
  const [season, setSeason] = useState(curSeason());
  const s = SEASONS[season];
  let content = null;
  switch(tab) {
    case "home": content=<HomeTab season={season} setSeason={setSeason} setTab={setTab}/>; break;
    case "env": content=<EnvTab season={season}/>; break;
    case "life": content=<LifeTab/>; break;
    case "living": content=<LivingTab/>; break;
    case "ferment": content=<FermentTab/>; break;
  }
  return <div style={{minHeight:"100vh",fontFamily:FB,position:"relative"}}>
    <BgLayer season={season}/>
    <div style={{position:"relative",zIndex:1,maxWidth:520,margin:"0 auto",padding:"16px 16px 100px"}}>{content}</div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:10,background:"rgba(255,255,255,0.88)",backdropFilter:"blur(20px)",borderTop:"1px solid #e8e0d8",padding:"4px 0 env(safe-area-inset-bottom, 6px)"}}>
      <div style={{display:"flex",maxWidth:520,margin:"0 auto"}}>{TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,padding:"7px 2px",color:tab===t.id?s.accent:"#bcaaa4",transition:"all 0.2s"}}><span style={{fontSize:20,transform:tab===t.id?"scale(1.15)":"scale(1)",transition:"transform 0.2s"}}>{t.icon}</span><span style={{fontSize:9,fontFamily:FB,fontWeight:tab===t.id?700:400,letterSpacing:.5}}>{t.label}</span>{tab===t.id&&<span style={{width:4,height:4,borderRadius:"50%",background:s.accent}}/>}</button>)}</div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
